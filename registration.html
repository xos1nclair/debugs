<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up — KLD Management System</title>
  <link rel="stylesheet" href="debugs.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <section id="header-section">
    <header class="site-header container">

      <div class="logo">
        <img src="Debugs (1).png" alt="DEBUGS Logo" class="logo-img">
        <span>KLD Management System</span>
      </div>

      <!-- BURGER BUTTON -->
      <button class="burger-btn" id="burgerBtn" aria-label="Toggle menu" aria-expanded="false">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </button>

    </header>
  </section>

  <!-- OVERLAY -->
  <div class="sidenav-overlay" id="sidenavOverlay"></div>

  <!-- SLIDING SIDENAV -->
  <nav class="sidenav" id="sidenav">
    <div class="sidenav-logo">
      <img src="Debugs (1).png" alt="DEBUGS Logo">
      <span>DEBUGS</span>
    </div>
    <a href="index.html"    class="sidenav-link"><i class="bi bi-house"></i> Home</a>
    <a href="capstone.html"     class="sidenav-link"><i class="bi bi-journal-text"></i> Capstone</a>
    <a href="goal.html"         class="sidenav-link"><i class="bi bi-bullseye"></i> Goal</a>
    <a href="members.html"      class="sidenav-link"><i class="bi bi-people"></i> Members</a>
    <a href="#" class="sidenav-link sidenav-login"
       onclick="showStep('role'); closeNav(); return false;">
      <i class="bi bi-box-arrow-in-right"></i> Log In
    </a>
    <a href="#" class="sidenav-link sidenav-signup"
       onclick="showStep('role'); closeNav(); return false;">
      <i class="bi bi-person-plus"></i> Sign Up
    </a>
  </nav>

  <!-- ===== FORM PAGE ===== -->
  <div class="form-page-wrapper">
    <div class="Form wide-form">

      <!-- ============================================================
           STEP 1: ROLE SELECTION
           ============================================================ -->
      <div id="stepRole" class="form-step active">

        <p class="step-label">Step 1 of 2</p>
        <p class="step-sub">Who are you?</p>

        <div class="role-cards">

          <!-- STUDENT -->
          <button class="role-card" onclick="selectRole('student')">
            <div class="role-icon">
              <i class="bi bi-person-badge"></i>
            </div>
            <span class="role-title">Student</span>
            <span class="role-desc">Submit and track your school documents online.</span>
          </button>

          <!-- TEACHER -->
          <button class="role-card" onclick="selectRole('teacher')">
            <div class="role-icon">
              <i class="bi bi-person-workspace"></i>
            </div>
            <span class="role-title">Teacher</span>
            <span class="role-desc">Manage and review student document submissions.</span>
          </button>

          <!-- Admin is removed from public view.
               Access admin login at: admin-login.html (share only with team) -->

        </div>
      </div>
      <!-- end stepRole -->

      <!-- ============================================================
           STEP 2: LOGIN / SIGN UP FORMS
           ============================================================ -->
      <div id="stepAuth" class="form-step">

        <p class="step-label">Step 2 of 2</p>

        <!-- Back button + selected role badge -->
        <div class="auth-header">
          <button class="back-btn" onclick="showStep('role')">
            <i class="bi bi-arrow-left"></i> Back
          </button>
          <span class="selected-role-badge" id="roleBadge">Student</span>
        </div>

        <!-- Hidden field — for backend: carries the selected role -->
        <input type="hidden" id="selectedRoleField" name="role" value="">

        <!-- TAB SWITCHER -->
        <div class="form-tabs">
          <button class="tab-btn active" id="loginTab"  onclick="switchTab('login')">Log In</button>
          <button class="tab-btn"        id="signupTab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- ===== LOGIN FORM ===== -->
        <form id="loginForm" class="auth-form active" action="websystem.html" method="post">

          <input type="hidden" name="role" id="loginRoleField" value="">

          <div class="input-group">
            <i class="bi bi-envelope-fill input-icon"></i>
            <input type="email" placeholder="Gmail account" name="email" required autocomplete="email">
          </div>

          <div class="input-group">
            <i class="bi bi-lock-fill input-icon"></i>
            <input type="password" placeholder="Password" name="password" required autocomplete="current-password">
          </div>

          <div class="checkbox-row">
            <input type="checkbox" id="rememberMe" name="remember">
            <label for="rememberMe">Remember me</label>
          </div>

          <!-- Backend devs: update action to your login endpoint -->
          <button type="submit" class="cta-image-wrapper login-button">
            <img src="New Project (10).png" alt="Log In" class="cta-graphic">
          </button>

          <p class="form-switch-text">
            No account yet?
            <a href="#" onclick="switchTab('signup'); return false;">Sign Up</a>
          </p>

        </form>

        <!-- ===== SIGN UP FORM ===== -->
        <form id="signupForm" class="auth-form" action="websystem.html" method="post">

          <input type="hidden" name="role" id="signupRoleField" value="">

          <div class="input-group">
            <i class="bi bi-person-fill input-icon"></i>
            <input type="text" placeholder="Full name" name="fullname" required autocomplete="name">
          </div>

          <div class="input-group">
            <i class="bi bi-envelope-fill input-icon"></i>
            <input type="email" placeholder="Gmail account" name="email" required autocomplete="email">
          </div>

          <div class="input-group">
            <i class="bi bi-lock-fill input-icon"></i>
            <input type="password" placeholder="Create password" name="password" required autocomplete="new-password">
          </div>

          <div class="input-group">
            <i class="bi bi-lock-fill input-icon"></i>
            <input type="password" placeholder="Confirm password" name="confirm_password" required autocomplete="new-password">
          </div>

          <div class="checkbox-row">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the terms &amp; conditions</label>
          </div>

          <!-- Backend devs: update action to your signup endpoint -->
          <button type="submit" class="cta-image-wrapper login-button">
            <img src="Sign up.png" alt="Sign Up" class="cta-graphic">
          </button>

          <p class="form-switch-text">
            Already have an account?
            <a href="#" onclick="switchTab('login'); return false;">Log In</a>
          </p>

        </form>

      </div>
      <!-- end stepAuth -->

    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="footer-homepage">
    <b>All Rights Reserved &copy; 2025 DEBUGS.</b>
    <div class="contact-info">
      <span><i class="bi bi-envelope-fill"></i> Debugs@web.com</span>
      <span><i class="bi bi-telephone-fill"></i> +63 415874586</span>
      <span><i class="bi bi-geo-alt-fill"></i> Kolehiyo ng Lungsod ng Dasmari&ntilde;as</span>
    </div>
  </footer>

  <script>
    /* ---- SIDENAV ---- */
    var burgerBtn = document.getElementById('burgerBtn');
    var sidenav   = document.getElementById('sidenav');
    var overlay   = document.getElementById('sidenavOverlay');

    function openNav() {
      sidenav.classList.add('open');
      overlay.classList.add('show');
      burgerBtn.classList.add('active');
      burgerBtn.setAttribute('aria-expanded', 'true');
      sidenav.insertBefore(burgerBtn, sidenav.firstChild);
    }

    function closeNav() {
      sidenav.classList.remove('open');
      overlay.classList.remove('show');
      burgerBtn.classList.remove('active');
      burgerBtn.setAttribute('aria-expanded', 'false');
      document.querySelector('.site-header').appendChild(burgerBtn);
    }

    burgerBtn.addEventListener('click', function() {
      sidenav.classList.contains('open') ? closeNav() : openNav();
    });

    overlay.addEventListener('click', closeNav);

    /* ---- STEP CONTROL ---- */
    function showStep(step) {
      var steps = document.querySelectorAll('.form-step');
      steps.forEach(function(s) { s.classList.remove('active'); });
      document.getElementById(step === 'role' ? 'stepRole' : 'stepAuth').classList.add('active');
    }

    /* ---- ROLE SELECTION ---- */
    var currentRole = '';

    var labels = { student: 'Student', teacher: 'Teacher' };
    var icons  = { student: 'bi-person-badge', teacher: 'bi-person-workspace' };

    function selectRole(role) {
      currentRole = role;

      // Update badge
      var label = labels[role] || role;
      document.getElementById('roleBadge').innerHTML =
        '<i class="bi ' + icons[role] + '"></i> ' + label;

      // Fill all hidden role fields
      document.getElementById('selectedRoleField').value = role;
      document.getElementById('loginRoleField').value    = role;
      document.getElementById('signupRoleField').value   = role;

      // Highlight selected card
      var cards = document.querySelectorAll('.role-card');
      cards.forEach(function(card) { card.classList.remove('selected'); });
      event.currentTarget.classList.add('selected');

      // Auto-advance to Step 2
      setTimeout(function() { showStep('auth'); }, 180);
    }

    /* ---- TAB SWITCHER ---- */
    function switchTab(tab) {
      var loginForm  = document.getElementById('loginForm');
      var signupForm = document.getElementById('signupForm');
      var loginTab   = document.getElementById('loginTab');
      var signupTab  = document.getElementById('signupTab');

      if (tab === 'login') {
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
      } else {
        signupForm.classList.add('active');
        loginForm.classList.remove('active');
        signupTab.classList.add('active');
        loginTab.classList.remove('active');
      }
    }
  </script>

</body>
</html>
